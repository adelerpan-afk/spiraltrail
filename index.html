<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spiral Animation - Fixed Center & Colors</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
    </script>
    <style>
        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ============================================================
           CANVAS WRAPPER - 16:9
           ============================================================ */
        #canvas-wrapper {
            position: relative;
            width: min(100vw, calc(100vh * 16 / 9));
            height: min(100vh, calc(100vw * 9 / 16));
            background: black;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(79, 195, 247, 0.05);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ============================================================
           OVERLAY - Stats & Timer
           ============================================================ */
        #overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 20px;
            z-index: 100;
            pointer-events: none;
        }

        #stats {
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #timer {
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-width: 70px;
            text-align: center;
        }
        #timer .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
        }
        #timer .time {
            color: #4fc3f7;
            font-weight: 700;
        }

        /* ============================================================
           CONTROL PANEL
           ============================================================ */
        #control-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 18px;
            color: white;
            width: 340px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            z-index: 1000;
            font-size: 13px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.9);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        #control-panel::-webkit-scrollbar {
            width: 3px;
        }
        #control-panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2px;
        }
        #control-panel::-webkit-scrollbar-thumb {
            background: rgba(79, 195, 247, 0.3);
            border-radius: 2px;
        }
        #control-panel.collapsed {
            transform: translateX(calc(100% + 20px));
            opacity: 0;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .panel-header h3 {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }
        .panel-header .controls {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .panel-toggle {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        .panel-toggle:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* --- groups --- */
        .control-group {
            margin-bottom: 12px;
        }
        .control-group-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 6px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            user-select: none;
        }
        .control-group-title:hover {
            color: rgba(255, 255, 255, 0.6);
        }
        .control-group-title .toggle-icon {
            font-size: 10px;
            transition: transform 0.3s;
        }
        .control-group-title .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }

        .control-group-body {
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 2000px;
        }
        .control-group-body.collapsed {
            max-height: 0;
        }

        /* --- items --- */
        .control-item {
            margin-bottom: 8px;
        }
        .control-item label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 3px;
        }
        .control-item label .value {
            color: #4fc3f7;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            min-width: 35px;
            text-align: right;
        }

        /* --- inputs --- */
        input[type="range"] {
            width: 100%;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4fc3f7;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.15);
            transition: all 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #29b6f6;
        }
        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4fc3f7;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        input[type="color"] {
            width: 32px;
            height: 26px;
            padding: 2px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 2px;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 2px;
        }

        /* --- color controls --- */
        .color-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-control input[type="color"] {
            flex-shrink: 0;
        }
        .color-control .color-hex {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            min-width: 50px;
        }

        .color-presets {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .color-preset-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            padding: 0;
        }
        .color-preset-btn:hover {
            transform: scale(1.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* --- presets --- */
        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }
        .preset-btn {
            flex: 1;
            min-width: 50px;
            padding: 4px 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .preset-btn.active {
            background: rgba(79, 195, 247, 0.15);
            border-color: #4fc3f7;
            color: #4fc3f7;
        }

        /* --- buttons --- */
        #toggle-panel-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        #toggle-panel-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.05);
        }

        .reset-btn {
            padding: 3px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.2s;
            border: 1px solid;
        }
        .reset-animation-btn {
            background: rgba(255, 193, 7, 0.15);
            border-color: rgba(255, 193, 7, 0.2);
            color: #ffd54f;
        }
        .reset-animation-btn:hover {
            background: rgba(255, 193, 7, 0.25);
        }
        .reset-settings-btn {
            background: rgba(244, 67, 54, 0.15);
            border-color: rgba(244, 67, 54, 0.2);
            color: #ef5350;
        }
        .reset-settings-btn:hover {
            background: rgba(244, 67, 54, 0.25);
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            #control-panel {
                width: 280px;
                right: 10px;
                top: 10px;
                padding: 12px;
                font-size: 12px;
                max-height: calc(100vh - 20px);
            }
            #toggle-panel-btn {
                top: 10px;
                right: 10px;
                padding: 5px 10px;
                font-size: 14px;
            }
            #overlay {
                bottom: 12px;
                left: 12px;
                gap: 10px;
                flex-direction: column;
            }
            #stats,
            #timer {
                font-size: 10px;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    CANVAS
    ============================================================ -->
    <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
        <div id="overlay">
            <div id="stats">FPS: 0 | Stars: 0/0</div>
            <div id="timer">
                <span class="label">⏱</span>
                <span class="time" id="timer-display">0.0s</span>
                <span style="color:rgba(255,255,255,0.2)">/</span>
                <span id="timer-total" style="color:rgba(255,255,255,0.3);font-size:11px;">15s</span>
            </div>
        </div>
    </div>

    <!-- ============================================================
    TOGGLE BUTTON
    ============================================================ -->
    <button id="toggle-panel-btn">⚙️</button>

    <!-- ============================================================
    CONTROL PANEL
    ============================================================ -->
    <div id="control-panel">
        <div class="panel-header">
            <h3>🎛️ Control Panel</h3>
            <div class="controls">
                <button class="reset-btn reset-animation-btn" id="reset-animation">⟳ Reset</button>
                <button class="reset-btn reset-settings-btn" id="reset-settings">↺ Default</button>
                <button class="panel-toggle" id="collapse-panel">✕</button>
            </div>
        </div>

        <!-- BASIC -->
        <div class="control-group">
            <div class="control-group-title" data-target="basic">
                Basic <span class="toggle-icon">▼</span>
            </div>
            <div class="control-group-body" id="basic">

                <!-- Star Color -->
                <div class="control-item">
                    <label>
                        Star Color
                        <span class="color-hex" id="val-star-color">#FFFFFF</span>
                    </label>
                    <div class="color-control">
                        <input type="color" id="ctrl-star-color" value="#ffffff" />
                        <div class="color-presets">
                            <button class="color-preset-btn" style="background:#ffffff;" data-color="#ffffff"></button>
                            <button class="color-preset-btn" style="background:#4fc3f7;" data-color="#4fc3f7"></button>
                            <button class="color-preset-btn" style="background:#ff6b6b;" data-color="#ff6b6b"></button>
                            <button class="color-preset-btn" style="background:#ffd93d;" data-color="#ffd93d"></button>
                            <button class="color-preset-btn" style="background:#6bcb77;" data-color="#6bcb77"></button>
                            <button class="color-preset-btn" style="background:#a66cff;" data-color="#a66cff"></button>
                        </div>
                    </div>
                </div>

                <!-- Trail Color -->
                <div class="control-item">
                    <label>
                        Trail Color
                        <span class="color-hex" id="val-trail-color">#FFFFFF</span>
                    </label>
                    <div class="color-control">
                        <input type="color" id="ctrl-trail-color" value="#ffffff" />
                        <div class="color-presets">
                            <button class="color-preset-btn" style="background:#ffffff;" data-color="#ffffff"></button>
                            <button class="color-preset-btn" style="background:#4fc3f7;" data-color="#4fc3f7"></button>
                            <button class="color-preset-btn" style="background:#ff6b6b;" data-color="#ff6b6b"></button>
                            <button class="color-preset-btn" style="background:#ffd93d;" data-color="#ffd93d"></button>
                            <button class="color-preset-btn" style="background:#6bcb77;" data-color="#6bcb77"></button>
                            <button class="color-preset-btn" style="background:#a66cff;" data-color="#a66cff"></button>
                        </div>
                    </div>
                </div>

                <!-- Background Color -->
                <div class="control-item">
                    <label>
                        Background
                        <span class="color-hex" id="val-bg-color">#000000</span>
                    </label>
                    <div class="color-control">
                        <input type="color" id="ctrl-bg-color" value="#000000" />
                        <div class="color-presets">
                            <button class="color-preset-btn" style="background:#000000;" data-color="#000000"></button>
                            <button class="color-preset-btn" style="background:#0a0a1a;" data-color="#0a0a1a"></button>
                            <button class="color-preset-btn" style="background:#1a0a0a;" data-color="#1a0a0a"></button>
                            <button class="color-preset-btn" style="background:#0a1a2e;" data-color="#0a1a2e"></button>
                        </div>
                    </div>
                </div>

                <!-- Numeric basics -->
                <div class="control-item">
                    <label>

                        <span class="value" id="val-trail">80</span>
                    </label>
                    <input type="range" id="ctrl-trail" min="10" max="200" step="1" value="80" />
                </div>
                <div class="control-item">
                    <label>
                        Duration (s)

        <!-- ADVANCED -->

                    <input type="range" id="ctrl-zoom" min="20" max="300" step="5" value="100" />

                <div class="control-item">
                    <label>
                        Spiral Radius
                        <span class="value" id="val-radius">170</span>
                    </label>
                    <input type="range" id="ctrl-radius" min="50" max="400" step="5" value="170" />

                <div class="control-item">
                    <label>
                        Star Opacity
                        <span class="value" id="val-star-opacity">1.0</span>

                <div class="control-item">
                    <label>
                        Trail Opacity
                        <span class="value" id="val-trail-opacity">1.0</span>
                    </label>
                    <input type="range" id="ctrl-trail-opacity" min="0.1" max="1" step="0.05" value="1" />

                    <label>

    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        // ================================================================
        // UTILITY
        // ================================================================
        const Utils = {
            lerp: (a, b, t) => a + (b - a) * t,
            clamp: (v, min, max) => Math.min(Math.max(v, min), max),
            map: (v, a, b, c, d) => c + (d - c) * ((v - a) / (b - a)),
            hexToRgba: (hex, opacity) => {
                let h = hex.replace('#', '');
                if (h.length === 3) h = h.split('').map(c => c + c).join('');
                const r = parseInt(h.substring(0, 2), 16);
                const g = parseInt(h.substring(2, 4), 16);
                const b = parseInt(h.substring(4, 6), 16);
                if (isNaN(r) || isNaN(g) || isNaN(b)) return `rgba(255,255,255,${opacity})`;
                return `rgba(${r},${g},${b},${opacity})`;
            }
        };

        // ================================================================
        // CONFIGURATION
        // ================================================================
        const DEFAULT_CONFIG = {
            numberOfStars: 5000,
            trailLength: 80,
            duration: 15,
            spiralTurns: 6,
            cameraZ: -400,
            cameraTravelDistance: 3400,
            viewZoom: 100,
            distMin: 15,
            distMax: 45,
            expMin: 1.2,
            expMax: 2.0,
            scaleMin: 0.7,
            scaleMax: 1.3,
            dotSizeBase: 8.5,
            frustumMargin: 100,
            spiralRadius: 170,
            trailWidthBase: 1.3,
            dprCap: 2,
            starColor: '#ffffff',
            trailColor: '#ffffff',
            bgColor: '#000000',
            starOpacity: 1,
            trailOpacity: 1
        };

        const PRESETS = {
            default: { ...DEFAULT_CONFIG },
            performance: {
                ...DEFAULT_CONFIG,
                numberOfStars: 2000,
                trailLength: 40,
                dprCap: 1,
                dotSizeBase: 6,
                frustumMargin: 150,
                starOpacity: 0.8,
                trailOpacity: 0.7
            },
            quality: {
                ...DEFAULT_CONFIG,
                numberOfStars: 15000,
                trailLength: 120,
                dprCap: 2,
                dotSizeBase: 10,
                spiralTurns: 8,
                cameraTravelDistance: 5000
            },
            cinematic: {
                ...DEFAULT_CONFIG,
                numberOfStars: 8000,
                trailLength: 150,
                duration: 25,
                spiralTurns: 10,
                cameraTravelDistance: 6000,
                spiralRadius: 250,
                distMax: 60,
                dotSizeBase: 12,
                starColor: '#4fc3f7',
                trailColor: '#4fc3f7',
                bgColor: '#0a0a1a'
            },
            neon: {
                ...DEFAULT_CONFIG,
                numberOfStars: 6000,
                trailLength: 100,
                duration: 18,
                spiralTurns: 7,
                starColor: '#ff6b9d',
                trailColor: '#ff6b9d',
                bgColor: '#1a0a2e',
                starOpacity: 0.9,
                trailOpacity: 0.8
            },
            aurora: {
                ...DEFAULT_CONFIG,
                numberOfStars: 10000,
                trailLength: 130,
                duration: 22,
                spiralTurns: 9,
                starColor: '#6bcb77',
                trailColor: '#4fc3f7',
                bgColor: '#0a1a2e',
                starOpacity: 0.8,
                trailOpacity: 0.6
            }
        };

        // ================================================================
        // OBJECT POOL
        // ================================================================
        class ObjectPool {
            constructor(factory, size = 100) {
                this.factory = factory;
                this.pool = [];
                this.active = 0;
                for (let i = 0; i < size; i++) this.pool.push(factory());
            }
            acquire() {
                if (this.active >= this.pool.length) {
                    for (let i = 0; i < 50; i++) this.pool.push(this.factory());
                }
                return this.pool[this.active++];
            }
            releaseAll() { this.active = 0; }
        }
        const vector3Pool = new ObjectPool(() => ({ x: 0, y: 0, z: 0 }), 200);

        // ================================================================
        // STAR SYSTEM
        // ================================================================
        class StarSystem {
            constructor(cfg) {
                this.cfg = cfg;
                this.count = cfg.numberOfStars;
                this.alloc();
                this.init();
            }
            alloc() {
                const n = this.count;
                this.angles = new Float32Array(n);
                this.distances = new Float32Array(n);
                this.rotationDirections = new Float32Array(n);
                this.expansionRates = new Float32Array(n);
                this.finalScales = new Float32Array(n);
                this.spiralLocations = new Float32Array(n);
                this.zPositions = new Float32Array(n);
                this.strokeWeights = new Float32Array(n);
                this.dx = new Float32Array(n);
                this.dy = new Float32Array(n);
                this.visible = new Uint8Array(n);
            }
            init() {
                const c = this.cfg;
                const lerp = Utils.lerp;
                for (let i = 0; i < this.count; i++) {
                    const a = Math.random() * Math.PI * 2;
                    this.angles[i] = a;
                    this.distances[i] = c.distMin + Math.random() * (c.distMax - c.distMin);
                    this.rotationDirections[i] = Math.random() > 0.5 ? 1 : -1;
                    this.expansionRates[i] = c.expMin + Math.random() * (c.expMax - c.expMin);
                    this.finalScales[i] = c.scaleMin + Math.random() * (c.scaleMax - c.scaleMin);
                    this.dx[i] = this.distances[i] * Math.cos(a);
                    this.dy[i] = this.distances[i] * Math.sin(a);
                    this.spiralLocations[i] = (1 - Math.pow(1 - Math.random(), 3)) / 1.3;
                    const z = c.cameraZ + Math.random() * (c.cameraTravelDistance + c.cameraZ - 0.5 * c.cameraZ);
                    this.zPositions[i] = lerp(z, c.cameraTravelDistance / 2, 0.3 * this.spiralLocations[i]);
                    this.strokeWeights[i] = Math.pow(Math.random(), 2);
                }
            }
            updateVisibility(ctrl, t1) {
                const c = ctrl.cfg;
                const z = c.cameraZ,
                    travel = c.cameraTravelDistance,
                    zoom = c.viewZoom,
                    margin = c.frustumMargin;
                const w = ctrl.cssWidth,
                    h = ctrl.cssHeight;
                const t2 = Utils.clamp((ctrl.time - 0.32) / (1 - 0.32), 0, 1);
                const newCamZ = z + ctrl.ease(Math.pow(t2, 1.2), 1.8) * travel;
                const left = -w / 2 - margin,
                    right = w / 2 + margin;
                const top = -h / 2 - margin,
                    bottom = h / 2 + margin;
                let count = 0;
                for (let i = 0; i < this.count; i++) {
                    const q = t1 - this.spiralLocations[i];
                    if (q <= 0 || this.zPositions[i] <= newCamZ) { this.visible[i] = 0; continue; }
                    const depth = this.zPositions[i] - newCamZ;
                    const px = (zoom * (this.zPositions[i] - z) * this.dx[i]) / (depth * zoom);
                    const py = (zoom * (this.zPositions[i] - z) * this.dy[i]) / (depth * zoom);
                    if (px > left && px < right && py > top && py < bottom) {
                        this.visible[i] = 1;
                        count++;
                    } else this.visible[i] = 0;
                }
                return count;
            }
        }

        // ================================================================
        // PERFORMANCE MONITOR
        // ================================================================
        class PerformanceMonitor {
            constructor() {
                this.frames = 0;
                this.fps = 0;
                this.last = performance.now();
                this.el = document.getElementById('stats');
                this.visible = 0;
                this.total = 0;
            }
            update(vis, total) {
                this.frames++;
                this.visible = vis;
                this.total = total;
                const now = performance.now();
                if (now - this.last >= 1000) {
                    this.fps = Math.round((this.frames * 1000) / (now - this.last));
                    this.frames = 0;
                    this.last = now;
                    if (this.el) {
                        this.el.textContent = `FPS: ${this.fps} | Stars: ${this.visible}/${this.total}`;
                    }
                }
            }
        }

        // ================================================================
        // TIMER
        // ================================================================
        class Timer {
            constructor() {
                this.display = document.getElementById('timer-display');
                this.totalEl = document.getElementById('timer-total');
            }
            update(t, d) {
                if (this.display) this.display.textContent = (t * d).toFixed(1) + 's';
                if (this.totalEl) this.totalEl.textContent = d + 's';
            }
            reset() { if (this.display) this.display.textContent = '0.0s'; }
        }

        // ================================================================
        // ANIMATION CONTROLLER
        // ================================================================
        class AnimationController {
            constructor(canvas, ctx, cssWidth, cssHeight, dpr, config) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.cssWidth = cssWidth;
                this.cssHeight = cssHeight;
                this.dpr = dpr;
                this.time = 0;
                this.cfg = { ...config };
                this.running = true;
                this.CHANGE_EVENT = 0.32;
                this.OFFSET_Y = 28;

                this.starSystem = new StarSystem(this.cfg);
                this.perf = new PerformanceMonitor();
                this.timer = new Timer();

                this.spiralCache = new Float32Array(1000 * 2);
                this.cacheSize = 1000;
                this.buildSpiralCache();
                this.setupTimeline();
            }

            buildSpiralCache() {
                for (let i = 0; i < this.cacheSize; i++) {
                    const p = i / (this.cacheSize - 1);
                    const pos = this.computeSpiral(p);
                    this.spiralCache[i * 2] = pos.x;
                    this.spiralCache[i * 2 + 1] = pos.y;
                }
            }
            computeSpiral(p) {
                p = Utils.clamp(1.2 * p, 0, 1);
                p = this.ease(p, 1.8);
                const theta = 2 * Math.PI * this.cfg.spiralTurns * Math.sqrt(p);
                const r = this.cfg.spiralRadius * Math.sqrt(p);
                return {
                    x: r * Math.cos(theta),
                    y: r * Math.sin(theta) + this.OFFSET_Y
                };
            }
            getSpiral(p) {
                p = Utils.clamp(p, 0, 1);
                const idx = Math.floor(p * (this.cacheSize - 1));
                const nxt = Math.min(idx + 1, this.cacheSize - 1);
                const frac = p * (this.cacheSize - 1) - idx;
                return {
                    x: this.spiralCache[idx * 2] + (this.spiralCache[nxt * 2] - this.spiralCache[idx * 2]) * frac,
                    y: this.spiralCache[idx * 2 + 1] + (this.spiralCache[nxt * 2 + 1] - this.spiralCache[idx * 2 + 1]) *
                        frac
                };
            }

            setupTimeline() {
                if (this.timeline) this.timeline.kill();
                this.time = 0;
                this.timeline = gsap.timeline({ repeat: -1 });
                this.timeline.to(this, {
                    time: 1,
                    duration: this.cfg.duration,
                    repeat: -1,
                    ease: "none",
                    onStart: () => this.timer.reset(),
                    onUpdate: () => {
                        if (this.running) {
                            this.render();
                            this.timer.update(this.time, this.cfg.duration);
                        }
                    },
                    onRepeat: () => { this.time = 0;
                        this.timer.reset(); }
                });
            }

            ease(p, g) {
                return p < 0.5 ? 0.5 * Math.pow(2 * p, g) : 1 - 0.5 * Math.pow(2 * (1 - p), g);
            }
            easeOutElastic(x) {
                if (x <= 0) return 0;
                if (x >= 1) return 1;
                const c = (2 * Math.PI) / 4.5;
                return Math.pow(2, -8 * x) * Math.sin((x * 8 - 0.75) * c) + 1;
            }

            render() {
                const ctx = this.ctx;
                if (!ctx) return;

                // Background
                ctx.fillStyle = this.cfg.bgColor;
                ctx.fillRect(0, 0, this.cssWidth, this.cssHeight);

                // Pusat canvas yang BENAR (cssWidth / 2, cssHeight / 2)
                ctx.save();
                ctx.translate(this.cssWidth / 2, this.cssHeight / 2);

                const t1 = Utils.clamp(Utils.map(this.time, 0, this.CHANGE_EVENT + 0.25, 0, 1), 0, 1);
                const t2 = Utils.clamp(Utils.map(this.time, this.CHANGE_EVENT, 1, 0, 1), 0, 1);
                ctx.rotate(-Math.PI * this.ease(t2, 2.7));

                this.drawTrail(t1, ctx);
                const visible = this.renderStars(t1, ctx);
                this.drawStartDot(ctx);

                ctx.restore();
                this.perf.update(visible, this.cfg.numberOfStars);
            }

            renderStars(t1, ctx) {
                const visibleCount = this.starSystem.updateVisibility(this, t1);
                const color = Utils.hexToRgba(this.cfg.starColor, this.cfg.starOpacity);
                vector3Pool.releaseAll();
                ctx.fillStyle = color;
                ctx.beginPath();

                const stars = this.starSystem;
                const c = this.cfg;
                let rendered = 0;

                for (let i = 0; i < stars.count; i++) {
                    if (!stars.visible[i]) continue;
                    const loc = stars.spiralLocations[i];
                    const sp = this.getSpiral(loc);
                    const q = t1 - loc;
                    if (q <= 0) continue;
                    const prog = Utils.clamp(4 * q, 0, 1);

                    let easing;
                    if (prog < 0.3) {
                        const t = prog / 0.3;
                        easing = Utils.lerp(prog, prog * prog, t);
                    } else if (prog < 0.7) {
                        const t = (prog - 0.3) / 0.4;
                        easing = Utils.lerp(prog * prog, this.easeOutElastic(prog), t);
                    } else {
                        easing = this.easeOutElastic(prog);
                    }

                    let sx, sy;
                    const dx = stars.dx[i],
                        dy = stars.dy[i];
                    if (prog < 0.3) {
                        const p = easing / 0.3;
                        sx = Utils.lerp(sp.x, sp.x + dx * 0.3, p);
                        sy = Utils.lerp(sp.y, sp.y + dy * 0.3, p);
                    } else if (prog < 0.7) {
                        const mid = (prog - 0.3) / 0.4;
                        const curve = Math.sin(mid * Math.PI) * stars.rotationDirections[i] * 1.5;
                        const bx = sp.x + dx * 0.3,
                            by = sp.y + dy * 0.3;
                        const tx = sp.x + dx * 0.7,
                            ty = sp.y + dy * 0.7;
                        const px = -dy * 0.4 * curve,
                            py = dx * 0.4 * curve;
                        sx = Utils.lerp(bx, tx, mid) + px * mid;
                        sy = Utils.lerp(by, ty, mid) + py * mid;
                    } else {
                        const fin = (prog - 0.7) / 0.3;
                        const td = stars.distances[i] * stars.expansionRates[i] * 1.5;
                        const ang = stars.angles[i] + 1.2 * stars.rotationDirections[i] * fin * Math.PI;
                        const bx = sp.x + dx * 0.7,
                            by = sp.y + dy * 0.7;
                        sx = Utils.lerp(bx, sp.x + td * Math.cos(ang), fin);
                        sy = Utils.lerp(by, sp.y + td * Math.sin(ang), fin);
                    }

                    const z = stars.zPositions[i];
                    const vx = (z - c.cameraZ) * sx / c.viewZoom;
                    const vy = (z - c.cameraZ) * sy / c.viewZoom;

                    let sizeMul = 1.0;
                    if (prog < 0.6) sizeMul = 1.0 + prog * 0.2;
                    else {
                        const t = (prog - 0.6) / 0.4;
                        sizeMul = Utils.lerp(1.2, stars.finalScales[i], t);
                    }
                    const dotSize = c.dotSizeBase * stars.strokeWeights[i] * sizeMul;

                    const pos = vector3Pool.acquire();
                    pos.x = vx;
                    pos.y = vy;
                    pos.z = z;
                    this.renderDot(pos, dotSize, ctx);
                    rendered++;
                }
                ctx.fill();
                return rendered;
            }

            renderDot(pos, sizeFactor, ctx) {
                const t2 = Utils.clamp(Utils.map(this.time, this.CHANGE_EVENT, 1, 0, 1), 0, 1);
                const newCamZ = this.cfg.cameraZ + this.ease(Math.pow(t2, 1.2), 1.8) * this.cfg.cameraTravelDistance;
                if (pos.z > newCamZ) {
                    const depth = pos.z - newCamZ;
                    const x = this.cfg.viewZoom * pos.x / depth;
                    const y = this.cfg.viewZoom * pos.y / depth;
                    const sw = this.cfg.dotSizeBase * sizeFactor / depth;
                    ctx.lineWidth = sw;
                    ctx.moveTo(x, y);
                    ctx.arc(x, y, 0.5, 0, Math.PI * 2);
                }
            }

            drawTrail(t1, ctx) {
                const color = Utils.hexToRgba(this.cfg.trailColor, this.cfg.trailOpacity);
                ctx.fillStyle = color;
                for (let i = 0; i < this.cfg.trailLength; i++) {
                    const f = Utils.map(i, 0, this.cfg.trailLength, 1.1, 0.1);
                    const sw = (this.cfg.trailWidthBase * (1 - t1) + 3.0 * Math.sin(Math.PI * t1)) * f;
                    const pathT = t1 - 0.00015 * i;
                    const pos = this.getSpiral(pathT);
                    const rot = this.rotateTrail(
                        pos.x, pos.y,
                        pos.x + 5, pos.y + 5,
                        Math.sin(this.time * Math.PI * 2) * 0.5 + 0.5,
                        i % 2 === 0
                    );
                    ctx.beginPath();
                    ctx.arc(rot.x, rot.y, sw / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            rotateTrail(x1, y1, x2, y2, p, orient) {
                const mx = (x1 + x2) / 2,
                    my = (y1 + y2) / 2;
                const dx = x1 - mx,
                    dy = y1 - my;
                const ang = Math.atan2(dy, dx) + (orient ? -1 : 1) * Math.PI * this.easeOutElastic(p);
                const r = Math.sqrt(dx * dx + dy * dy);
                const bounce = Math.sin(p * Math.PI) * 0.05 * (1 - p);
                return {
                    x: mx + r * (1 + bounce) * Math.cos(ang),
                    y: my + r * (1 + bounce) * Math.sin(ang)
                };
            }

            drawStartDot(ctx) {
                if (this.time > this.CHANGE_EVENT) {
                    const dy = this.cfg.cameraZ * this.OFFSET_Y / this.cfg.viewZoom;
                    const pos = vector3Pool.acquire();
                    pos.x = 0;
                    pos.y = dy;
                    pos.z = this.cfg.cameraTravelDistance;
                    const color = Utils.hexToRgba(this.cfg.starColor, this.cfg.starOpacity);
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    this.renderDot(pos, 2.5, ctx);
                    ctx.fill();
                }
            }

            // ========== CONTROL ==========
            updateConfig(newCfg) {
                this.cfg = { ...newCfg };
                this.starSystem = new StarSystem(this.cfg);
                this.buildSpiralCache();
                this.time = 0;
                this.timer.reset();
                this.setupTimeline();
                this.render();
            }

            resetAnimation() {
                this.time = 0;
                this.timer.reset();
                if (this.timeline) { this.timeline.restart();
                    this.timeline.play(); }
                this.running = true;
                this.render();
            }

            pause() { this.running = false; if (this.timeline) this.timeline.pause(); }
            resume() { this.running = true; if (this.timeline) this.timeline.play(); }
            destroy() { if (this.timeline) this.timeline.kill(); }
        }

        // ================================================================
        // CONTROL PANEL
        // ================================================================
        class ControlPanel {
            constructor() {
                this.currentConfig = { ...DEFAULT_CONFIG };
                this.controller = null;
                this.isPanelOpen = true;

                this.setupControls();
                this.setupColorPresets();
                this.setupPresets();
                this.setupToggle();
                this.setupResetButtons();
                this.setupCollapsibleGroups();
                this.loadConfig(DEFAULT_CONFIG);
            }

            // ---- setup controls ----
            setupControls() {
                // Range controls
                const rangeMap = {
                    'stars': 'numberOfStars',
                    'trail': 'trailLength',
                    'duration': 'duration',
                    'turns': 'spiralTurns',
                    'camz': 'cameraZ',
                    'travel': 'cameraTravelDistance',
                    'zoom': 'viewZoom',
                    'radius': 'spiralRadius',
                    'dist-min': 'distMin',
                    'dist-max': 'distMax',
                    'star-opacity': 'starOpacity',
                    'trail-opacity': 'trailOpacity'
                };
                Object.entries(rangeMap).forEach(([id, key]) => {
                    const inp = document.getElementById(`ctrl-${id}`);
                    const disp = document.getElementById(`val-${id}`);
                    if (inp && disp) {
                        inp.addEventListener('input', () => {
                            const v = parseFloat(inp.value);
                            disp.textContent = v;
                            this.currentConfig[key] = v;
                            this.applyConfig();
                        });
                    }
                });

                // ===== PERBAIKAN COLOR CONTROLS =====
                const colorMap = [
                    { id: 'star-color', key: 'starColor' },
                    { id: 'trail-color', key: 'trailColor' },
                    { id: 'bg-color', key: 'bgColor' }
                ];
                colorMap.forEach(({ id, key }) => {
                    const inp = document.getElementById(`ctrl-${id}`);
                    const disp = document.getElementById(`val-${id}`);
                    if (inp && disp) {
                        // set initial value from config
                        inp.value = this.currentConfig[key] || '#ffffff';
                        disp.textContent = inp.value.toUpperCase();

                        inp.addEventListener('input', () => {
                            const v = inp.value;
                            disp.textContent = v.toUpperCase();
                            this.currentConfig[key] = v;
                            console.log(`🎨 ${key} = ${v}`);
                            this.applyConfig();
                        });
                    } else {
                        console.warn(`⚠️ Color control not found: ${id}`);
                    }
                });
            }

            setupColorPresets() {
                document.querySelectorAll('.color-preset-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const color = btn.dataset.color;
                        const parent = btn.closest('.control-item');
                        const inp = parent?.querySelector('input[type="color"]');
                        const disp = parent?.querySelector('.color-hex');
                        if (inp && disp) {
                            inp.value = color;
                            disp.textContent = color.toUpperCase();
                            // cari key dari id input
                            const id = inp.id.replace('ctrl-', '');
                            const key = id === 'star-color' ? 'starColor' :
                                id === 'trail-color' ? 'trailColor' :
                                id === 'bg-color' ? 'bgColor' : null;
                            if (key) {
                                this.currentConfig[key] = color;
                                console.log(`🎨 Preset ${key} = ${color}`);
                                this.applyConfig();
                            }
                        }
                    });
                });
            }

            setupPresets() {
                document.querySelectorAll('.preset-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const name = btn.dataset.preset;
                        const cfg = PRESETS[name];
                        if (cfg) {
                            this.loadConfig(cfg);
                            this.applyConfig();
                            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                        }
                    });
                });
            }

            setupCollapsibleGroups() {
                document.querySelectorAll('.control-group-title').forEach(title => {
                    title.addEventListener('click', () => {
                        const target = document.getElementById(title.dataset.target);
                        const icon = title.querySelector('.toggle-icon');
                        if (target && icon) {
                            target.classList.toggle('collapsed');
                            icon.classList.toggle('collapsed');
                        }
                    });
                });
            }

            setupToggle() {
                const panel = document.getElementById('control-panel');
                const toggleBtn = document.getElementById('toggle-panel-btn');
                const collapseBtn = document.getElementById('collapse-panel');
                const toggle = () => {
                    this.isPanelOpen = !this.isPanelOpen;
                    panel.classList.toggle('collapsed', !this.isPanelOpen);
                    toggleBtn.textContent = this.isPanelOpen ? '✕' : '⚙️';
                    toggleBtn.style.right = this.isPanelOpen ? '360px' : '20px';
                };
                toggleBtn.addEventListener('click', toggle);
                collapseBtn.addEventListener('click', toggle);
            }

            setupResetButtons() {
                document.getElementById('reset-animation').addEventListener('click', () => {
                    if (this.controller) this.controller.resetAnimation();
                });
                document.getElementById('reset-settings').addEventListener('click', () => {
                    this.loadConfig(DEFAULT_CONFIG);
                    this.applyConfig();
                    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                    document.querySelector('[data-preset="default"]')?.classList.add('active');
                });
            }

            // ---- config management ----
            loadConfig(cfg) {
                this.currentConfig = { ...cfg };
                const map = {
                    'stars': 'numberOfStars',
                    'trail': 'trailLength',
                    'duration': 'duration',
                    'turns': 'spiralTurns',
                    'camz': 'cameraZ',
                    'travel': 'cameraTravelDistance',
                    'zoom': 'viewZoom',
                    'radius': 'spiralRadius',
                    'dist-min': 'distMin',
                    'dist-max': 'distMax',
                    'star-opacity': 'starOpacity',
                    'trail-opacity': 'trailOpacity',
                    'star-color': 'starColor',
                    'trail-color': 'trailColor',
                    'bg-color': 'bgColor'
                };
                Object.entries(map).forEach(([id, key]) => {
                    const inp = document.getElementById(`ctrl-${id}`);
                    const disp = document.getElementById(`val-${id}`);
                    if (inp && disp) {
                        const val = cfg[key];
                        inp.value = val;
                        if (typeof val === 'string' && val.startsWith('#')) {
                            disp.textContent = val.toUpperCase();
                        } else {
                            disp.textContent = val;
                        }
                    }
                });
            }

            applyConfig() {
                if (this.controller) {
                    this.controller.updateConfig(this.currentConfig);
                    const total = document.getElementById('timer-total');
                    if (total) total.textContent = this.currentConfig.duration + 's';
                }
            }

            setController(ctrl) { this.controller = ctrl; }
        }

        // ================================================================
        // INIT
        // ================================================================
        function init() {
            const canvas = document.getElementById('canvas');
            const wrapper = document.getElementById('canvas-wrapper');
            const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });

            const panel = new ControlPanel();
            let controller = null;

            function resize() {
                const rect = wrapper.getBoundingClientRect();
                const cssW = rect.width;
                const cssH = rect.height;
                const dpr = Math.min(window.devicePixelRatio || 1, panel.currentConfig.dprCap);

                if (canvas.width !== cssW * dpr || canvas.height !== cssH * dpr) {
                    canvas.width = cssW * dpr;
                    canvas.height = cssH * dpr;
                    canvas.style.width = cssW + 'px';
                    canvas.style.height = cssH + 'px';
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                    ctx.scale(dpr, dpr);
                }

                if (controller) {
                    controller.cssWidth = cssW;
                    controller.cssHeight = cssH;
                    controller.dpr = dpr;
                }
                return { cssW, cssH, dpr };
            }

            let { cssW, cssH, dpr } = resize();
            controller = new AnimationController(canvas, ctx, cssW, cssH, dpr, panel.currentConfig);
            panel.setController(controller);

            let timeout;
            const ro = new ResizeObserver(() => {
                clearTimeout(timeout);
                timeout = setTimeout(() => resize(), 50);
            });
            ro.observe(wrapper);

            window.addEventListener('resize', () => {
                clearTimeout(timeout);
                timeout = setTimeout(() => resize(), 100);
            });

            document.addEventListener('visibilitychange', () => {
                if (!controller) return;
                document.hidden ? controller.pause() : controller.resume();
            });

            document.querySelector('[data-preset="default"]')?.classList.add('active');
            console.log('✅ Spiral Animation ready.');
            console.log(`📐 Canvas center: (${cssW/2}, ${cssH/2})`);
            return controller;
        }

        const app = init();
        window.__app = app;
    </script>
